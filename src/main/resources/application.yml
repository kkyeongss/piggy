spring:
  application:
    name: piggy

  datasource:
    # 내장 H2 파일 DB. JAR와 같은 폴더의 data/ 에 저장 (./data/piggy.mv.db).
    url: jdbc:h2:file:./data/piggy;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  # 개발용 데이터 확인: http://localhost:8080/h2-console
  h2:
    console:
      enabled: true

server:
  port: 8080
  address: 0.0.0.0

# 실행 스크립트에서 -Dpiggy.open-browser=true 로 켜면 시작 시 브라우저 자동 오픈
piggy:
  open-browser: false
